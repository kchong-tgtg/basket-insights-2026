name: Encrypt HTML with StatiCrypt

on:
  push:
    branches:
      - main
    paths:
      - '**.html'

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install staticrypt
        run: npm install -g staticrypt@3

      - name: Encrypt all HTML files
        env:
          PASS: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          find . -type f -name "*.html" -not -path "./.github/*" | while read file; do
            echo "Encrypting $file"
            dir=$(dirname "$file")
            title=$(grep -oP '(?<=<title>)[^<]+' "$file" | head -1)
            staticrypt "$file" -p "$PASS" -d "$dir" --config false --short \
              --template-title "${title:-TGTG Basket NL Insights}" \
              --template-color-primary "#00615F" \
              --template-color-secondary "#F9F3F0" \
              --template-button "UNLOCK"
          done

      - name: Commit encrypted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-encrypt HTML files [skip ci]"
          git push