name: Encrypt HTML with StatiCrypt

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
  workflow_dispatch:

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install staticrypt
        run: npm install -g staticrypt@3

      - name: Encrypt all HTML files
        env:
          STATICRYPT_PASSWORD: ${{ secrets.TGTG_KCHONG_STATICRYPT_PASSWORD }}
        run: |
          find . -type f -name "*.html" -not -path "./.github/*" -exec staticrypt {} -o {} --config false \;

      - name: Commit encrypted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-encrypt HTML files [skip ci]"
          git push