name: Encrypt HTML with StatiCrypt

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
  workflow_dispatch:
jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install -g staticrypt@2

      - name: Encrypt all HTML files
        run: |
          find . -name "*.html" -not -path "./.github/*" | while read file; do
            echo "Encrypting $file"
            staticrypt "$file" -p "${{ secrets.TGTG_KCHONG_STATICRYPT_PASSWORD }}" -o "$file" --short
          done

      - name: Commit encrypted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-encrypt HTML files [skip ci]"
          git push