name: Encrypt HTML with StatiCrypt

on:
  push:
    branches:
      - main
    paths:
      - '**.html'

jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Encrypt all HTML files
        run: |
          find . -name "*.html" -not -path "./.github/*" | while read file; do
            staticrypt "$file" -p "${{ secrets.TGTG_KCHONG_STATICRYPT_PASSWORD }}" -o "$file"
          done

      - name: Commit encrypted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-encrypt HTML files"
          git push